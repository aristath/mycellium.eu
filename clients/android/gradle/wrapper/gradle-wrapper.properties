# The Gradle wrapper metadata is committed, but the wrapper JAR is NOT (it is a
# binary). After cloning, run `gradle wrapper` once (with a system Gradle >= 8.9)
# to materialize `gradle/wrapper/gradle-wrapper.jar` + `gradlew`/`gradlew.bat`.
# See README.md.
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
