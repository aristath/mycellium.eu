# Standalone workspace: an empty `[workspace]` table makes this crate its own
# workspace root, so it is NOT pulled into the repo's root workspace (matching how
# the other platform clients stay isolated) — no edit to the root Cargo.toml.
[workspace]

[package]
name = "mycellium-desktop"
version = "0.1.0"
description = "Mycellium desktop client (Linux + Windows) — a Tauri v2 shell over mycellium-sdk"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Mycellium Team"]
rust-version = "1.96"
# Deliberately NOT a member of the root workspace: like the other platform
# clients, this is an isolated Cargo project that path-depends on the SDK. Keeping
# it out of the workspace stops Tauri's heavy dependency tree (webkit/gtk/wry)
# from affecting the server/CLI builds.

[[bin]]
name = "mycellium-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
mycellium-sdk = { path = "../../../crates/mycellium-sdk" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# The cross-platform OS secret store (#65 desktop adapter): libsecret / Secret
# Service on Linux, Credential Manager on Windows, Keychain on macOS. Backends are
# opt-in per platform so we only pull in what each OS needs.
[target.'cfg(target_os = "linux")'.dependencies]
keyring = { version = "3", features = ["sync-secret-service", "crypto-rust"] }

[target.'cfg(windows)'.dependencies]
keyring = { version = "3", features = ["windows-native"] }

[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3", features = ["apple-native"] }

# The messaging round-trip test spins up an in-process directory + queue, exactly
# like the CLI e2e — so they're dev-only path deps here.
[dev-dependencies]
mycellium-directory = { path = "../../../crates/mycellium-directory" }
mycellium-queue = { path = "../../../crates/mycellium-queue" }

[features]
# Tauri's `custom-protocol` is used for release builds that embed the frontend.
custom-protocol = ["tauri/custom-protocol"]
