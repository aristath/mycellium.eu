# XcodeGen spec for the Mycellium SwiftUI app (iOS + macOS) — issues #68/#69.
#
# Mac-only. This produces the Xcode project for the SwiftUI app. It is NOT used
# by `swift build`/`swift test` on Linux (those build the SDK-integration core
# via the sibling Package.swift). Generate the project with:
#
#     brew install xcodegen        # once
#     cd clients/apple
#     ./build-rust.sh              # generates the Swift binding + C header
#     # ...also build the Apple xcframework (see build-rust.sh header + README)
#     xcodegen generate --spec App/project.yml
#     open Mycellium.xcodeproj
#
# Consumption model (why the app compiles the shared sources directly rather than
# depending on the SwiftPM package): the Package.swift target links the *host*
# `.so` via Linux-oriented linker flags for `swift test`. The Apple app instead
# links `MyceliumFFI.xcframework` (per-arch static libs), so it embeds the same
# generated `mycellium_sdk.swift` + `MyceliumSecrets` sources and the FFI module,
# and links the xcframework. One binding, two link strategies.

name: Mycellium
options:
  bundleIdPrefix: eu.mycellium
  deploymentTarget:
    iOS: "15.0"
    macOS: "12.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    # The generated binding imports the `mycellium_sdkFFI` clang module; point
    # the importer at the committed modulemap + generated header.
    SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Sources/mycellium_sdkFFI"

targets:
  MyceliumApp:
    type: application
    platform: [iOS, macOS]
    sources:
      # The SwiftUI app.
      - path: App
      # The shared SDK-integration sources (same files the SwiftPM package uses).
      - path: Sources/MyceliumSDK          # Facade.swift + Generated/mycellium_sdk.swift
      - path: Sources/MyceliumSecrets      # KeychainSecretStore.swift (+ file fallback)
      - path: Sources/mycellium_sdkFFI     # module.modulemap + mycellium_sdkFFI.h
        buildPhase: none                    # headers/modulemap, not compiled
    dependencies:
      # Built by build-rust.sh's documented Apple path (cargo apple targets ->
      # xcframework). Provides libmycellium_sdk for device + simulator + macOS.
      - framework: MyceliumFFI.xcframework
        embed: false
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Mycellium
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.mycellium.app
        GENERATE_INFOPLIST_FILE: NO
        # APNs entitlement for contentless push (#71) is added in Signing &
        # Capabilities; the SDK's registerPush(.apns(topic:)) uses the bundle id.
