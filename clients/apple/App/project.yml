name: Mycellium
options:
  bundleIdPrefix: eu.mycellium
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Sources/mycellium_mobileFFI"

targets:
  Mycellium:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - project.yml
          - Info.plist
          - Assets.xcassets
      - path: Sources/MycelliumMobile
      - path: Sources/mycellium_mobileFFI
        buildPhase: none
    resources:
      - path: App/Assets.xcassets
    dependencies:
      - framework: MycelliumFFI.xcframework
        embed: false
    info:
      path: App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.mycellium.ios
        PRODUCT_NAME: Mycellium
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
