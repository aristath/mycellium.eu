<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f0c" />
  <link rel="manifest" href="./manifest.json" />
  <title>Mycellium</title>
  <style>
    :root { --bg:#0b0f0c; --panel:#12181400; --card:#151b17; --line:#232c26; --ink:#e8f2ea; --dim:#8fa596; --accent:#37d67a; --me:#1f6f43; --them:#1b2620; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; }
    body { background:var(--bg); color:var(--ink); font:15px/1.45 system-ui, -apple-system, sans-serif; display:flex; flex-direction:column; height:100dvh; }
    header { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--line); background:var(--card); }
    header .who { font-weight:600; } header .who small { color:var(--dim); font-weight:400; }
    header .grow { flex:1; }
    button { font:inherit; border:0; border-radius:9px; padding:9px 13px; background:var(--accent); color:#04120a; font-weight:600; cursor:pointer; }
    button.ghost { background:transparent; color:var(--accent); padding:6px 8px; }
    button:disabled { opacity:.5; cursor:default; }
    main { flex:1; overflow-y:auto; }
    .wrap { max-width:640px; margin:0 auto; padding:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; margin-top:10vh; }
    .card h1 { font-size:1.4rem; margin:0 0 4px; } .card p { color:var(--dim); margin:.2rem 0 1rem; }
    label { display:block; font-size:.8rem; color:var(--dim); margin:12px 0 4px; }
    input { width:100%; padding:11px 12px; border-radius:9px; border:1px solid var(--line); background:#0d120f; color:var(--ink); font:inherit; }
    .row { display:flex; gap:8px; margin-top:16px; }
    .err { color:#ff8f8f; font-size:.85rem; min-height:1.1em; margin-top:8px; }
    .item { display:flex; gap:12px; align-items:center; width:100%; text-align:left; background:transparent; color:var(--ink); border-bottom:1px solid var(--line); border-radius:0; padding:14px 16px; }
    .item:hover { background:#10161200; }
    .avatar { width:42px; height:42px; border-radius:50%; background:var(--them); display:grid; place-items:center; font-weight:700; color:var(--accent); flex:none; }
    .item .body { flex:1; min-width:0; }
    .item .title { font-weight:600; }
    .item .snippet { color:var(--dim); font-size:.87rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .empty { color:var(--dim); text-align:center; padding:3rem 1rem; }
    .fab { position:sticky; bottom:16px; float:right; margin:16px; box-shadow:0 6px 20px #0008; }
    .msgs { display:flex; flex-direction:column; gap:6px; padding:16px; }
    .bubble { max-width:78%; padding:8px 12px; border-radius:14px; background:var(--them); align-self:flex-start; word-wrap:break-word; }
    .bubble.me { background:var(--me); align-self:flex-end; }
    .attach { max-width:220px; max-height:220px; border-radius:8px; display:block; }
    .bubble .time { font-size:.62rem; opacity:.55; margin-left:8px; }
    .bubble .sender { font-size:.7rem; color:var(--accent); margin-bottom:2px; }
    .when { float:right; font-size:.72rem; color:var(--dim); font-weight:400; }
    .offline { color:#e8908f; font-size:.8rem; margin-right:10px; }
    .bubble { cursor:pointer; }
    .replybar { display:flex; align-items:center; gap:8px; padding:8px 12px; background:#10161a; border-top:1px solid var(--line); font-size:.85rem; color:var(--dim); }
    .replybar span { color:var(--ink); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .composer { display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--line); background:var(--card); }
    .composer input { flex:1; }
    .backbar { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--line); background:var(--card); }
    .modal-bg { position:fixed; inset:0; background:#000a; display:grid; place-items:center; padding:16px; }
    .modal { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; width:100%; max-width:380px; }
    .actions { display:flex; flex-direction:column; gap:8px; } .actions button { width:100%; }
  </style>
</head>
<body>
  <div id="app"><div class="wrap"><div class="card"><h1>Mycellium</h1><p>loading…</p></div></div></div>

  <script type="module">
    import init, { version, user_id, generate_wallet, directory_login, Session } from './pkg/mycellium_wasm.js';

    // ---- the engine runs in a Web Worker (off the UI thread) — talk to it by RPC ----
    const worker = new Worker('./worker.js', { type: 'module' });
    let rpcId = 0; const pending = new Map();
    worker.onmessage = (e) => { const { id, ok, result, err } = e.data; const p = pending.get(id); if (p) { pending.delete(id); ok ? p.res(result) : p.rej(new Error(err)); } };
    const rpc = (op, args = []) => new Promise((res, rej) => { const id = ++rpcId; pending.set(id, { res, rej }); worker.postMessage({ id, op, args }); });

    // ---- config (the directory + queue this app talks to) ----
    const qs = new URLSearchParams(location.search);
    const cfg = {
      dir: qs.get('dir') || localStorage.getItem('myc_dir') || '',
      queue: qs.get('queue') || localStorage.getItem('myc_queue') || '',
    };
    if (qs.get('dir')) localStorage.setItem('myc_dir', cfg.dir);
    if (qs.get('queue')) localStorage.setItem('myc_queue', cfg.queue);

    let me = null, open = null, poll = null;
    let seen = {}, firstScan = true, replyTo = null, og = null, showSettings = false, showLink = false, online = true;
    let pairNew = false, pairPollTimer = null;
    const app = document.getElementById('app');
    const esc = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const initials = (s) => (s || '?').trim().slice(0, 2).toUpperCase();
    const timeShort = (ts) => new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const relTime = (ts) => { const s = Date.now() / 1000 - ts; if (s < 60) return 'now'; if (s < 3600) return Math.floor(s / 60) + 'm'; if (s < 86400) return Math.floor(s / 3600) + 'h'; return Math.floor(s / 86400) + 'd'; };

    async function boot() {
      await init(); // for the test hooks below; the worker loads its own engine copy
      const stored = await rpc('get', ['myc:me']);
      me = stored ? JSON.parse(stored) : null;
      // Test/dev hook only — exposes the engine for the e2e suites. Gated to
      // localhost so a real deployment never hands the engine to page scripts.
      if (['localhost', '127.0.0.1', ''].includes(location.hostname)) {
        window.mycellium = { version, user_id, generate_wallet, directory_login, Session, rpc };
      }
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
      if (me && 'Notification' in window && Notification.permission === 'default') await Notification.requestPermission().catch(() => {});
      if (me) enablePush();
      await render();
      startPolling();
      await notifyNew(); // seed "seen" so only future messages notify
    }

    function startPolling() {
      if (poll) clearInterval(poll);
      if (!me || !cfg.queue) return;
      poll = setInterval(async () => {
        try {
          const n = await rpc('sync', [cfg.queue]);
          if (!online) { online = true; render(); }
          if (n > 0) { await notifyNew(); render(); }
        } catch {
          if (online) { online = false; render(); }
        }
      }, 3000);
    }

    // Fire a desktop notification for a new incoming message you're not looking
    // at. Seeds `seen` on the first pass so pre-existing messages don't notify.
    async function notifyNew() {
      let threads = [];
      try { threads = JSON.parse(await rpc('peers')); } catch { return; }
      const granted = 'Notification' in window && Notification.permission === 'granted';
      for (const t of threads) {
        const prev = seen[t.peer] || 0;
        if (!firstScan && granted && !t.mine && t.timestamp > prev) {
          const viewing = open === t.peer && !document.hidden;
          if (!viewing) { try { new Notification(t.peer, { body: t.last, tag: t.peer }); } catch {} }
        }
        seen[t.peer] = Math.max(prev, t.timestamp);
      }
      firstScan = false;
    }

    // Subscribe to Web Push so the queue can wake us when the app is closed.
    // Best-effort: no-op if the browser/push service is unavailable.
    async function enablePush() {
      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
        if (Notification.permission !== 'granted' || !cfg.queue) return;
        const reg = await navigator.serviceWorker.ready;
        let sub = await reg.pushManager.getSubscription();
        if (!sub) {
          const key = await rpc('push_key', [cfg.queue]);
          sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8(key) });
        }
        await rpc('push_subscribe', [cfg.queue, sub.endpoint]);
      } catch {}
    }
    function urlB64ToUint8(b64) {
      const pad = '='.repeat((4 - (b64.length % 4)) % 4);
      const s = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(s);
      return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
    }

    async function render() {
      if (!cfg.dir || !cfg.queue) return renderSetup();
      if (!me) return pairNew ? renderPairNew() : renderRegister();
      if (showLink) return renderPairApprove();
      if (showSettings) return renderSettings();
      if (og) return renderGroupThread(og);
      return open ? renderThread(open) : renderList();
    }

    function renderSetup() {
      app.innerHTML = `<div class="wrap"><div class="card">
        <h1>Connect Mycellium</h1><p>Point this app at your directory and queue.</p>
        <label>Directory URL</label><input id="dir" placeholder="https://directory.example" value="${esc(cfg.dir)}">
        <label>Queue URL</label><input id="queue" placeholder="https://queue.example" value="${esc(cfg.queue)}">
        <div class="row"><button id="save">Continue</button></div>
        <div class="row" style="margin-top:6px"><button class="ghost" id="linkexisting">Join an existing account</button></div>
        <div class="err" id="err"></div>
      </div></div>`;
      byId('linkexisting').onclick = () => {
        cfg.dir = byId('dir').value.trim().replace(/\/$/, '');
        cfg.queue = byId('queue').value.trim().replace(/\/$/, '');
        if (!cfg.dir || !cfg.queue) return setErr('Enter your directory + queue first.');
        localStorage.setItem('myc_dir', cfg.dir); localStorage.setItem('myc_queue', cfg.queue);
        pairNew = true; render();
      };
      byId('save').onclick = () => {
        cfg.dir = byId('dir').value.trim().replace(/\/$/, '');
        cfg.queue = byId('queue').value.trim().replace(/\/$/, '');
        if (!cfg.dir || !cfg.queue) return setErr('Both URLs are required.');
        localStorage.setItem('myc_dir', cfg.dir); localStorage.setItem('myc_queue', cfg.queue);
        render();
      };
    }

    function renderRegister() {
      app.innerHTML = `<div class="wrap"><div class="card">
        <h1>Pick a username</h1><p>Others reach you by this name. It runs entirely in your browser.</p>
        <label>Username</label><input id="u" placeholder="alice" autocapitalize="off">
        <label>Display name</label><input id="n" placeholder="Alice">
        <div class="row"><button id="go">Create account</button></div>
        <div class="row" style="margin-top:6px"><button class="ghost" id="joininstead">Join an existing account</button></div>
        <div class="err" id="err"></div>
      </div></div>`;
      byId('joininstead').onclick = () => { pairNew = true; render(); };
      byId('go').onclick = async () => {
        const handle = byId('u').value.trim().toLowerCase();
        const name = byId('n').value.trim() || handle;
        if (!/^[a-z0-9_]{2,32}$/.test(handle)) return setErr('Username: 2–32 chars, a–z 0–9 _');
        byId('go').disabled = true; setErr('');
        try {
          await rpc('register', [cfg.dir, cfg.queue, handle, name]);
          me = { handle, name };
          await rpc('put', ['myc:me', JSON.stringify(me)]);
          render(); startPolling();
        } catch (e) { byId('go').disabled = false; setErr('Registration failed: ' + e); }
      };
    }

    async function renderList() {
      let threads = [], groups = [];
      try { threads = JSON.parse(await rpc('peers')); } catch {}
      try { groups = JSON.parse(await rpc('groups')); } catch {}
      const groupItems = groups.map((g) => `
        <button class="item" data-group="${esc(g.id)}">
          <div class="avatar" style="background:#22322a;color:#7fe0a8">#</div>
          <div class="body"><div class="title">${esc(g.name)}</div>
          <div class="snippet">${g.members.length} member${g.members.length === 1 ? '' : 's'}</div></div>
        </button>`).join('');
      const peerItems = threads.map((t) => `
        <button class="item" data-peer="${esc(t.peer)}">
          <div class="avatar">${initials(t.name || t.peer)}</div>
          <div class="body"><div class="title">${esc(t.name || t.peer)}<span class="when">${relTime(t.timestamp)}</span></div>
          <div class="snippet">${t.mine ? 'You: ' : ''}${esc(t.last) || 'No messages yet'}</div></div>
        </button>`).join('');
      const items = (groupItems + peerItems) || `<div class="empty">No conversations yet.<br>Tap + to start one.</div>`;
      app.innerHTML = `
        <header><div class="who">${esc(me.name)} <small>@${esc(me.handle)}</small></div><div class="grow"></div>${online ? '' : '<span class="offline">● offline</span>'}<button class="ghost" id="settings">⚙</button></header>
        <main>${items}</main>
        <button class="fab" id="new">＋</button>`;
      app.querySelectorAll('.item[data-peer]').forEach((b) => b.onclick = () => { open = b.dataset.peer; render(); });
      app.querySelectorAll('.item[data-group]').forEach((b) => b.onclick = () => { og = b.dataset.group; render(); });
      byId('new').onclick = () => fabMenu();
      byId('settings').onclick = () => { showSettings = true; render(); };
    }

    async function renderSettings() {
      const wallet = (await rpc('wallet').catch(() => '')) || '';
      app.innerHTML = `
        <div class="backbar"><button class="ghost" id="back">‹ Chats</button><b>Settings</b></div>
        <main><div class="wrap"><div class="card">
          <label>Display name</label><input id="sname" value="${esc(me.name)}">
          <div class="row"><button id="ssave">Save</button></div>
          <div class="row" style="margin-top:14px"><button id="linkdev" style="background:#22322a;color:#7fe0a8">📱 Approve a device</button></div>
          <p style="margin-top:16px;color:var(--dim)">Username <b style="color:var(--ink)">@${esc(me.handle)}</b> — people reach you by this.</p>
          <p style="color:var(--dim)">Device key <code style="font-size:.72rem">${esc(wallet.slice(0, 24))}…</code></p>
          <hr style="border-color:var(--line);margin:18px 0">
          <button id="reset" style="background:#5a1f1f;color:#ffdede">Reset this device</button>
          <p style="color:var(--dim);font-size:.8rem;margin-top:6px">Erases your identity + conversations from this browser.</p>
        </div></div></main>`;
      byId('back').onclick = () => { showSettings = false; render(); };
      byId('linkdev').onclick = () => { showLink = true; render(); };
      byId('ssave').onclick = async () => {
        const n = byId('sname').value.trim(); if (!n) return;
        try { await rpc('register', [cfg.dir, cfg.queue, me.handle, n]); me.name = n; await rpc('put', ['myc:me', JSON.stringify(me)]); showSettings = false; render(); }
        catch (e) { alert('Save failed: ' + e); }
      };
      byId('reset').onclick = () => {
        if (!confirm('Reset this device? This erases your account + messages here.')) return;
        indexedDB.deleteDatabase('mycellium'); localStorage.clear(); location.reload();
      };
    }

    // New device: show a one-time pairing code + QR, and poll until an existing
    // device approves it (which delivers the account over the pairing channel —
    // no seed phrase, and the code is worthless once used or after it expires).
    async function renderPairNew() {
      let offer;
      try { offer = await rpc('pair_offer', [cfg.queue]); }
      catch (e) { app.innerHTML = `<div class="wrap"><div class="card"><p class="err">Could not start pairing: ${esc('' + e)}</p><div class="row"><button id="back">Back</button></div></div></div>`; byId('back').onclick = () => { pairNew = false; render(); }; return; }
      let qr = ''; try { qr = await rpc('qr_svg', [offer]); } catch {}
      app.innerHTML = `
        <div class="backbar"><button class="ghost" id="back">‹ Cancel</button><b>Join an account</b></div>
        <main><div class="wrap"><div class="card">
          <p>On a device already signed in, open <b>Settings → Approve a device</b> and scan this — or paste the code below. Keep this screen open.</p>
          <div style="background:#fff;padding:10px;border-radius:12px;max-width:260px;margin:14px auto">${qr}</div>
          <label>Pairing code</label>
          <textarea id="offer" rows="3" readonly onclick="this.select()">${esc(offer)}</textarea>
          <div class="row"><button id="copy">Copy code</button></div>
          <p id="status" style="color:#8aa;font-size:.85rem;margin-top:12px">Waiting for approval…</p>
        </div></div></main>`;
      byId('back').onclick = () => { if (pairPollTimer) { clearInterval(pairPollTimer); pairPollTimer = null; } pairNew = false; render(); };
      byId('copy').onclick = async () => { try { await navigator.clipboard.writeText(offer); byId('copy').textContent = 'Copied ✓'; } catch { byId('offer').select(); } };
      if (pairPollTimer) clearInterval(pairPollTimer);
      pairPollTimer = setInterval(async () => {
        let res;
        try { res = await rpc('pair_poll', [cfg.queue]); } catch { return; }
        if (res) {
          clearInterval(pairPollTimer); pairPollTimer = null;
          const c = JSON.parse(res);
          cfg.dir = c.dir || cfg.dir; cfg.queue = c.queue || cfg.queue;
          me = { handle: c.handle, name: c.name };
          localStorage.setItem('myc_dir', cfg.dir); localStorage.setItem('myc_queue', cfg.queue);
          await rpc('put', ['myc:me', JSON.stringify(me)]);
          pairNew = false; render(); startPolling();
        }
      }, 2000);
    }

    // Existing device: paste the new device's pairing code and approve it.
    async function renderPairApprove() {
      app.innerHTML = `
        <div class="backbar"><button class="ghost" id="back">‹ Settings</button><b>Approve a device</b></div>
        <main><div class="wrap"><div class="card">
          <p>On your <b>new</b> device, choose "Join an existing account". Paste the pairing code it shows here to add it to <b>@${esc(me.handle)}</b>.</p>
          <label>Pairing code from the new device</label><textarea id="offer" rows="3" placeholder="paste the code…"></textarea>
          <div class="row"><button id="approve">Approve device</button></div>
          <p style="color:#e8908f;font-size:.8rem;margin-top:12px">⚠ Only approve a device you physically control — this shares your account key with it.</p>
          <div class="err" id="aerr"></div>
        </div></div></main>`;
      byId('back').onclick = () => { showLink = false; render(); };
      byId('approve').onclick = async () => {
        const offer = byId('offer').value.trim();
        if (!offer) return;
        byId('approve').disabled = true;
        try {
          await rpc('pair_approve', [offer, me.handle, cfg.dir]);
          byId('approve').textContent = 'Approved ✓ — finish on the new device';
        } catch (e) { byId('aerr').textContent = 'Approve failed: ' + e; byId('approve').disabled = false; }
      };
    }

    function fabMenu() {
      app.insertAdjacentHTML('beforeend', `<div class="modal-bg" id="bg"><div class="modal"><div class="actions">
        <button id="dm">✉ Message someone</button>
        <button id="grp">👥 New group</button>
        <button class="ghost" id="cancel">Cancel</button>
      </div></div></div>`);
      const close = () => byId('bg').remove();
      byId('cancel').onclick = close;
      byId('dm').onclick = () => { close(); newChat(); };
      byId('grp').onclick = () => { close(); newGroup(); };
    }

    function newGroup() {
      app.insertAdjacentHTML('beforeend', `<div class="modal-bg" id="bg"><div class="modal">
        <h1 style="font-size:1.1rem;margin:0 0 10px">New group</h1>
        <label>Group name</label><input id="gname" placeholder="Team">
        <label>Members (usernames, comma-separated)</label><input id="gmembers" placeholder="bob, carol">
        <div class="row"><button id="gok">Create</button><button class="ghost" id="gcancel">Cancel</button></div>
      </div></div></div>`);
      const close = () => byId('bg').remove();
      byId('gcancel').onclick = close;
      byId('gok').onclick = async () => {
        const name = byId('gname').value.trim();
        const members = byId('gmembers').value.split(',').map((s) => s.trim().toLowerCase()).filter(Boolean);
        if (!name || !members.length) return;
        try {
          const gid = await rpc('group_create', [cfg.dir, me.handle, me.name, cfg.queue, name, JSON.stringify(members)]);
          close(); og = gid; render();
        } catch (e) { alert('Create failed: ' + e); }
      };
    }

    async function renderGroupThread(gid) {
      let group = null; try { group = JSON.parse(await rpc('groups')).find((g) => g.id === gid); } catch {}
      let msgs = []; try { msgs = JSON.parse(await rpc('group_thread', [gid])); } catch {}
      const bubbles = msgs.map((m) => {
        const mine = m.sender === me.handle;
        const who = mine ? '' : `<div class="sender">${esc(m.sender)}</div>`;
        return `<div class="bubble ${mine ? 'me' : ''}">${who}${esc(m.text)}<span class="time">${timeShort(m.timestamp)}</span></div>`;
      }).join('') || `<div class="empty">No messages yet</div>`;
      app.innerHTML = `
        <div class="backbar"><button class="ghost" id="back">‹ Chats</button><b># ${esc(group ? group.name : gid)}</b><div class="grow"></div><button class="ghost" id="gmenu">⋯</button></div>
        <main><div class="msgs" id="msgs">${bubbles}</div></main>
        <div class="composer"><input id="msg" placeholder="Message the group" autocomplete="off"><button id="send">Send</button></div>`;
      byId('back').onclick = () => { og = null; render(); };
      byId('gmenu').onclick = () => groupMenu(gid);
      const send = async () => {
        const text = byId('msg').value.trim(); if (!text) return;
        byId('msg').value = '';
        try { await rpc('group_send', [cfg.dir, me.handle, me.name, cfg.queue, gid, text]); renderGroupThread(gid); }
        catch (e) { alert('Send failed: ' + e); }
      };
      byId('send').onclick = send;
      byId('msg').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
      const m = byId('msgs'); if (m) m.scrollTop = m.scrollHeight;
    }

    async function renderThread(peer) {
      let msgs = [];
      try { msgs = JSON.parse(await rpc('thread', [peer])); } catch {}
      let pname = peer; try { pname = (await rpc('name_of', [peer])) || peer; } catch {}
      const files = await Promise.all(msgs.map((m) => rpc('file', [m.id]).catch(() => null)));
      const bubbles = msgs.map((m, i) => {
        let inner = esc(m.text);
        const file = files[i];
        if (file && file.startsWith('data:image')) inner = `<img class="attach" src="${file}" alt="${esc(m.text)}">`;
        return `<div class="bubble ${m.from_me ? 'me' : ''}" data-id="${esc(m.id)}" title="Tap to reply">${inner}<span class="time">${timeShort(m.timestamp)}</span></div>`;
      }).join('') || `<div class="empty">Say hello 👋</div>`;
      const replyMsg = replyTo && msgs.find((m) => m.id === replyTo);
      const banner = replyMsg
        ? `<div class="replybar">↪ Replying: <span>${esc(replyMsg.text.slice(0, 60))}</span><button class="ghost" id="cancelReply">✕</button></div>`
        : '';
      app.innerHTML = `
        <div class="backbar"><button class="ghost" id="back">‹ Chats</button><b>${esc(pname)}</b></div>
        <main><div class="msgs" id="msgs">${bubbles}</div></main>
        ${banner}
        <div class="composer">
          <button class="ghost" id="attach" title="Attach image">📎</button>
          <input type="file" id="file" accept="image/*" hidden>
          <input id="msg" placeholder="Message @${esc(peer)}" autocomplete="off"><button id="send">Send</button>
        </div>`;
      byId('back').onclick = () => { open = null; replyTo = null; render(); };
      byId('attach').onclick = () => byId('file').click();
      byId('file').onchange = async () => {
        const f = byId('file').files[0]; if (!f) return;
        if (f.size > 256 * 1024) { alert(`Image too large (${Math.ceil(f.size / 1024)} KB) — max 256 KB.`); byId('file').value = ''; return; }
        try {
          const b64 = await fileToB64(f);
          await rpc('send_file', [cfg.dir, me.handle, me.name, cfg.queue, peer, f.name, f.type || 'application/octet-stream', b64]);
          renderThread(peer);
        } catch (e) { alert('Attach failed: ' + e); }
      };
      app.querySelectorAll('.bubble[data-id]').forEach((b) => b.onclick = () => msgActions(peer, b.dataset.id, b.classList.contains('me')));
      if (byId('cancelReply')) byId('cancelReply').onclick = () => { replyTo = null; renderThread(peer); };
      const send = async () => {
        const text = byId('msg').value.trim(); if (!text) return;
        byId('msg').value = '';
        const rt = replyTo; replyTo = null;
        try {
          if (rt) await rpc('reply', [cfg.dir, me.handle, me.name, cfg.queue, peer, rt, text]);
          else await rpc('send', [cfg.dir, me.handle, me.name, cfg.queue, peer, text]);
          renderThread(peer);
        } catch (e) { alert('Send failed: ' + e); }
      };
      byId('send').onclick = send;
      byId('msg').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
      const m = byId('msgs'); if (m) m.scrollTop = m.scrollHeight;
    }

    function msgActions(peer, id, mine) {
      app.insertAdjacentHTML('beforeend', `<div class="modal-bg" id="bg"><div class="modal"><div class="actions">
        <button id="reply">↪ Reply</button>
        <button id="react">👍 React</button>
        ${mine ? '<button id="del">🗑 Delete</button>' : ''}
        <button class="ghost" id="cancel">Cancel</button>
      </div></div></div>`);
      const close = () => byId('bg').remove();
      const act = async (fn) => { close(); try { await fn(); renderThread(peer); } catch (e) { alert('Failed: ' + e); } };
      byId('cancel').onclick = close;
      byId('reply').onclick = () => { close(); replyTo = id; renderThread(peer); };
      byId('react').onclick = () => act(() => rpc('react', [cfg.dir, me.handle, me.name, cfg.queue, peer, id, '👍']));
      if (byId('del')) byId('del').onclick = () => act(() => rpc('delete_message', [cfg.dir, me.handle, me.name, cfg.queue, peer, id]));
    }

    function newChat() {
      app.insertAdjacentHTML('beforeend', `<div class="modal-bg" id="bg"><div class="modal">
        <h1 style="font-size:1.1rem;margin:0 0 10px">New message</h1>
        <label>Their username</label><input id="peer" placeholder="bob" autocapitalize="off">
        <div class="row"><button id="ok">Open</button><button class="ghost" id="cancel">Cancel</button></div>
      </div></div>`);
      const close = () => byId('bg').remove();
      byId('cancel').onclick = close;
      byId('ok').onclick = () => { const p = byId('peer').value.trim().toLowerCase(); if (p) { close(); open = p; renderThread(p); } };
    }

    function groupMenu(gid) {
      app.insertAdjacentHTML('beforeend', `<div class="modal-bg" id="bg"><div class="modal"><div class="actions">
        <button id="gadd">＋ Add member</button>
        <button id="gleave" style="background:#5a1f1f;color:#ffdede">Leave group</button>
        <button class="ghost" id="gcancel">Cancel</button>
      </div></div></div>`);
      const close = () => byId('bg').remove();
      byId('gcancel').onclick = close;
      byId('gadd').onclick = () => { close(); addMember(gid); };
      byId('gleave').onclick = async () => {
        close();
        if (!confirm('Leave this group?')) return;
        try { await rpc('group_leave', [cfg.dir, me.handle, me.name, cfg.queue, gid]); og = null; render(); }
        catch (e) { alert('Leave failed: ' + e); }
      };
    }

    function addMember(gid) {
      app.insertAdjacentHTML('beforeend', `<div class="modal-bg" id="bg"><div class="modal">
        <h1 style="font-size:1.1rem;margin:0 0 10px">Add member</h1>
        <label>Username</label><input id="amu" placeholder="carol" autocapitalize="off">
        <div class="row"><button id="amok">Add</button><button class="ghost" id="amcancel">Cancel</button></div>
      </div></div></div>`);
      const close = () => byId('bg').remove();
      byId('amcancel').onclick = close;
      byId('amok').onclick = async () => {
        const u = byId('amu').value.trim().toLowerCase(); if (!u) return;
        try { await rpc('group_add', [cfg.dir, me.handle, me.name, cfg.queue, gid, u]); close(); renderGroupThread(gid); }
        catch (e) { alert('Add failed: ' + e); }
      };
    }
    function fileToB64(f) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(String(r.result).split(',')[1]); r.onerror = rej; r.readAsDataURL(f); }); }
    function byId(id) { return document.getElementById(id); }
    function setErr(m) { const e = byId('err'); if (e) e.textContent = m; }

    boot().catch((e) => { app.innerHTML = `<div class="wrap"><div class="card"><h1>Error</h1><p>${esc(String(e))}</p></div></div>`; });
  </script>
</body>
</html>
