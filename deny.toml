# cargo-deny configuration — supply-chain gate for the Mycellium workspace.
# Run locally with `cargo deny check`; enforced in CI by the `deny` job.
#
# Scope: this checks the whole dependency graph in Cargo.lock. The workspace
# itself is `MIT OR Apache-2.0`; everything allowed below is a permissive (or
# file-scoped weak-copyleft, MPL-2.0) license that some transitive dependency
# actually carries — the list is derived from the real tree, not a blanket allow.

[graph]
# Evaluate every target we ship to (native servers/clients, wasm, and the
# thumbv7em bare-metal core). `all-features = false` keeps optional, unbuilt
# libp2p transports (dns/mdns) out of the graph, matching what CI compiles.
all-features = false

[advisories]
# RUSTSEC advisory DB. `cargo audit` is the primary advisory gate (see the
# `audit` CI job); deny re-checks the same DB as a complementary net. The two
# hickory-proto DoS advisories below are reachable only through libp2p's
# OPTIONAL dns/mdns features, which this workspace never enables — the crates
# sit in Cargo.lock but are never compiled. This mirrors the `audit` job's
# `--ignore` set so we don't double-fail on the same deferred ids.
ignore = ["RUSTSEC-2026-0118", "RUSTSEC-2026-0119", "RUSTSEC-2026-0124"]
# Only fail on an unmaintained crate the workspace depends on *directly* — one we
# could actually swap out. Transitive-only unmaintained crates (bincode, paste,
# rustls-pemfile — all pulled deep under axum-server/uniffi with no safe upgrade
# reachable) are informational, matching how the `audit` job treats them. Real
# vulnerabilities and yanked crates still fail regardless of depth.
unmaintained = "workspace"

[licenses]
# Permissive-only allowlist, plus MPL-2.0 (file-scoped weak copyleft, used by
# uniffi/attohttpc). Every entry is present in the current tree; SPDX `OR`
# expressions resolve against these, so we do not need to list the copyleft
# alternatives (e.g. LGPL) that only appear as one branch of an `OR`.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "0BSD",
    "Zlib",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    # Public-domain dedication; the bitcoin crypto crates nostr pulls (bitcoin-io,
    # bitcoin_hashes, secp256k1 chain) are CC0-1.0.
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Duplicate versions are common and often unavoidable in a large transitive
# graph (e.g. two `windows-sys` majors). Surface them as a warning for hygiene,
# but never hard-fail the build on a dupe we can't control.
multiple-versions = "warn"
# Every wildcard dependency in this tree is an internal workspace `path` dep
# (the crates reference each other by path, without a version, which resolves to
# `*`). There are no wildcard deps on crates.io packages. `allow-wildcard-paths`
# only exempts these for crates marked `publish = false`, which the 0.0.0
# workspace members are not, so allow wildcards outright — safe here because they
# are all local path deps, never a `*` pin against a published crate.
wildcards = "allow"

[sources]
# crates.io only — no git or alternate-registry dependencies.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
