[workspace]
resolver = "2"
members = [
    "crates/mycellium-core",
    "crates/mycellium-directory",
    "crates/mycellium-transport",
    "crates/mycellium-storage",
    "crates/mycellium-cli",
]

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Mycellium Team"]
rust-version = "1.96"
repository = "https://github.com/aristath/mycellium.eu"

# The core is compiled for everything from microcontrollers to desktops, so we
# keep release builds small and predictable. See docs/CONCEPT.md Layer 10.
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
