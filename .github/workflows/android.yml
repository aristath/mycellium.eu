name: Android

# The Android client lives outside the Cargo workspace and the main CI. This
# workflow builds it (catching SDK-binding drift that would break the app) and
# runs the on-device e2e test against a live directory+queue on an emulator.
# Triggered only on changes that can affect it.
on:
  push:
    branches: [main]
    paths:
      - 'clients/android/**'
      - 'crates/mycellium-sdk/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'clients/android/**'
      - 'crates/mycellium-sdk/**'
  workflow_dispatch:

env:
  NDK_VERSION: '26.3.11579264'

jobs:
  build:
    name: build · app + test APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Rust + Android target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Install NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VERSION}" >/dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
      - name: Build native .so + UniFFI Kotlin binding (x86_64)
        run: ANDROID_ABIS=x86_64 ./clients/android/build-rust.sh
      - name: Pin Gradle 8.9 wrapper
        working-directory: clients/android
        run: gradle wrapper --gradle-version 8.9
      - name: Assemble app + androidTest APKs
        working-directory: clients/android
        run: ./gradlew --no-daemon assembleDebug assembleDebugAndroidTest

  instrumented-test:
    name: e2e · emulator + live servers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Rust + Android target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Install NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VERSION}" >/dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
      - name: Build native .so + binding (x86_64)
        run: ANDROID_ABIS=x86_64 ./clients/android/build-rust.sh
      - name: Pin Gradle 8.9 wrapper
        working-directory: clients/android
        run: gradle wrapper --gradle-version 8.9
      - name: Build directory + queue
        run: cargo build --release -p mycellium-server -p mycellium-queue
      - name: Start directory + queue (dev auth) on the host
        run: |
          # The emulator reaches these at 10.0.2.2:<port> (host loopback).
          ./target/release/mycellium-server --dev --addr 127.0.0.1:18080 &
          ./target/release/mycellium-queue --dev --addr 127.0.0.1:18090 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:18080/health >/dev/null && curl -sf http://127.0.0.1:18090/health >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:18080/health && echo " directory up" || { echo "servers did not come up"; exit 1; }
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: Run on-device e2e (messaging round-trip + Keystore persistence)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: >
            cd clients/android &&
            ./gradlew --no-daemon connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.dirPort=18080
            -Pandroid.testInstrumentationRunnerArguments.queuePort=18090
