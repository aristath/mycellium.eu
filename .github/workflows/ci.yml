name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + rustfmt + clippy)
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets
      - name: no_std core builds without std
        run: cargo build -p mycellium-core --no-default-features

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # (Using `cargo audit` directly, not rustsec/audit-check, so no check-run API
      # permission is needed.)
      - name: Audit
        run: cargo audit

  msrv:
    name: msrv (1.96.0 builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Enforce the `rust-version = "1.96"` promise in the root Cargo.toml: the
      # whole workspace must build on exactly that toolchain, not just on stable.
      - name: Install Rust 1.96.0
        run: rustup toolchain install 1.96.0 --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build the workspace on the declared MSRV
        run: cargo +1.96.0 build --workspace --all-targets

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # Supply-chain gate: licenses, advisories, banned/duplicate crates, and
      # source registries — configured in deny.toml. Complements `cargo audit`.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check advisories, licenses, bans, sources
        run: cargo deny check

  doc:
    name: cargo doc (warnings are errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      # Fail on any rustdoc warning — broken intra-doc links, private-item links,
      # etc. — so doc-rot cannot land silently.
      - name: Build docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  no-std-embedded:
    name: no_std bare-metal (thumbv7em-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + thumbv7em-none-eabi target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - name: Cross-compile the core for bare metal
        run: cargo build -p mycellium-core --no-default-features --target thumbv7em-none-eabi

  android:
    name: Android bindings · tests · APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK and NDK
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.3.11579264"
      - name: Install Rust Android toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-linux-android
          cargo install cargo-ndk --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate native library and Kotlin bindings
        working-directory: clients/android
        env:
          ANDROID_ABIS: x86_64
        run: ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/26.3.11579264" ./build-rust.sh
      - name: Run JVM tests and assemble the debug APK
        working-directory: clients/android
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

  apple-bindings:
    name: Apple bindings · Swift tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Verify Swift toolchain
        run: swift --version
      - name: Generate Swift bindings
        working-directory: clients/apple
        run: ./build-rust.sh
      - name: Run Swift boundary tests
        working-directory: clients/apple
        run: swift test

  registry-image:
    name: Registry container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f Dockerfile.registry -t mycellium-registry:ci .
      - name: Verify non-root runtime user
        run: test "$(docker image inspect --format '{{.Config.User}}' mycellium-registry:ci)" = "10001:10001"
