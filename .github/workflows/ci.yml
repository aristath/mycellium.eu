name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + rustfmt + clippy)
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # RUSTSEC-2026-0124 is a potential panic in libcrux-chacha20poly1305 on an
      # overlong ciphertext buffer. The fixed 0.0.8 is unreachable: MDK's crypto
      # chain (mdk-core → openmls_rust_crypto → hpke-rs-libcrux → libcrux-aead)
      # pins `libcrux-chacha20poly1305 ^0.0.7`, so it cannot be bumped without a
      # new MDK release. Any other advisory still fails the job.
      # (Using `cargo audit` directly, not rustsec/audit-check, so no check-run API
      # permission is needed.)
      - name: Audit
        run: cargo audit --ignore RUSTSEC-2026-0124

  msrv:
    name: msrv (1.96.0 builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Enforce the `rust-version = "1.96"` promise in the root Cargo.toml: the
      # whole workspace must build on exactly that toolchain, not just on stable.
      - name: Install Rust 1.96.0
        run: rustup toolchain install 1.96.0 --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build the workspace on the declared MSRV
        run: cargo +1.96.0 build --workspace --all-targets

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # Supply-chain gate: licenses, advisories, banned/duplicate crates, and
      # source registries — configured in deny.toml. Complements `cargo audit`.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check advisories, licenses, bans, sources
        run: cargo deny check

  doc:
    name: cargo doc (warnings are errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      # Fail on any rustdoc warning — broken intra-doc links, private-item links,
      # etc. — so doc-rot cannot land silently.
      - name: Build docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
