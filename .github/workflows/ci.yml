name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + rustfmt + clippy)
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: no_std core builds without std
        run: cargo build -p mycellium-core --no-default-features
      - name: SDK bindings smoke test (Kotlin + Swift generate)
        run: ./crates/mycellium-sdk/bindings/generate.sh

  wasm:
    name: wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-bindgen-cli (pinned to the crate's version)
        run: cargo install wasm-bindgen-cli --version 0.2.100 --locked
      - name: Build the WASM engine
        run: ./clients/web/build.sh
      - name: Verify generated web assets exist
        run: |
          test -f clients/web/pkg/mycellium_wasm.js || { echo "missing pkg/mycellium_wasm.js"; exit 1; }
          test -f clients/web/pkg/mycellium_wasm_bg.wasm || { echo "missing pkg/mycellium_wasm_bg.wasm"; exit 1; }
          echo "web assets present"
      - name: Upload deployable web bundle
        uses: actions/upload-artifact@v4
        with:
          name: mycellium-web
          path: |
            clients/web/index.html
            clients/web/worker.js
            clients/web/sw.js
            clients/web/manifest.json
            clients/web/icon.svg
            clients/web/pkg/
          if-no-files-found: error

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # RUSTSEC-2026-0118/-0119 are hickory-proto DoS advisories reachable only
      # through libp2p's OPTIONAL dns/mdns features, which this workspace does not
      # enable — the crates sit in Cargo.lock but are never compiled (`cargo tree
      # -i hickory-proto` is empty). No current libp2p release avoids listing them,
      # so we ignore the advisories for those uncompiled deps rather than mask a
      # real one. Any other advisory still fails the job.
      # (Using `cargo audit` directly, not rustsec/audit-check, so no check-run API
      # permission is needed.)
      - name: Audit
        run: cargo audit --ignore RUSTSEC-2026-0118 --ignore RUSTSEC-2026-0119 --ignore RUSTSEC-2026-0124

  msrv:
    name: msrv (1.96.0 builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Enforce the `rust-version = "1.96"` promise in the root Cargo.toml: the
      # whole workspace must build on exactly that toolchain, not just on stable.
      - name: Install Rust 1.96.0
        run: rustup toolchain install 1.96.0 --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build the workspace on the declared MSRV
        run: cargo +1.96.0 build --workspace --all-targets

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # Supply-chain gate: licenses, advisories, banned/duplicate crates, and
      # source registries — configured in deny.toml. Complements `cargo audit`.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check advisories, licenses, bans, sources
        run: cargo deny check

  doc:
    name: cargo doc (warnings are errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      # Fail on any rustdoc warning — broken intra-doc links, private-item links,
      # etc. — so doc-rot cannot land silently.
      - name: Build docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  no-std-embedded:
    name: no_std bare-metal (thumbv7em-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Prove the "runs on microcontrollers" claim (docs/CONCEPT.md Layer 10,
      # ESP32 / Cortex-M4/M7): cross-compile the portable core, no_std + alloc, to
      # a bare-metal Cortex-M target with default (std) features off.
      - name: Install Rust + thumbv7em-none-eabi target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - name: Cross-compile the core for bare metal
        run: cargo build -p mycellium-core --no-default-features --target thumbv7em-none-eabi
