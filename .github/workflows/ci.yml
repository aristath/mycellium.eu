name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + rustfmt + clippy)
        run: rustup toolchain install stable --profile minimal --component rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      # Informational until a one-time `cargo fmt` sweep lands (the tree predates
      # rustfmt). Flip `continue-on-error` off once it's clean to make it a gate.
      - name: Format check (informational)
        run: cargo fmt --all --check
        continue-on-error: true
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: no_std core builds without std
        run: cargo build -p mycellium-core --no-default-features

  wasm:
    name: wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-bindgen-cli (pinned to the crate's version)
        run: cargo install wasm-bindgen-cli --version 0.2.100 --locked
      - name: Build the WASM engine
        run: ./clients/web/build.sh

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
