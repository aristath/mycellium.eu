name: Apple SDK (Linux verify)

# The iOS/macOS client's SwiftUI app needs Xcode/macOS, but its SDK-integration
# core (the UniFFI Swift binding + the Rust .so + the messaging round-trip test)
# builds and runs on Linux — so we verify THAT here on every relevant change,
# catching Swift-binding drift the same way the Android build job catches Kotlin
# drift. Triggered only on changes that can affect it.
on:
  push:
    branches: [main]
    paths:
      - 'clients/apple/**'
      - 'crates/mycellium-sdk/**'
      - '.github/workflows/apple.yml'
  pull_request:
    paths:
      - 'clients/apple/**'
      - 'crates/mycellium-sdk/**'
  workflow_dispatch:

jobs:
  swift-sdk:
    name: swift build + test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10.1'
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build SDK .so + Swift binding
        run: |
          cargo build -p mycellium-sdk --lib
          ( cd clients/apple && ./build-rust.sh )
      - name: Build directory + queue
        run: cargo build --release -p mycellium-server -p mycellium-queue
      - name: Start directory + queue (dev auth)
        run: |
          MYCELLIUM_DEV_AUTH=1 ./target/release/mycellium-server --addr 127.0.0.1:19080 &
          ./target/release/mycellium-queue --addr 127.0.0.1:19090 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:19080/health >/dev/null && curl -sf http://127.0.0.1:19090/health >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:19080/health && echo " servers up" || { echo "servers did not start"; exit 1; }
      - name: swift build + test (SDK core + messaging round-trip)
        working-directory: clients/apple
        env:
          MYCELLIUM_RUST_LIB_DIR: ${{ github.workspace }}/target/debug
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
        run: |
          swift build
          swift test
