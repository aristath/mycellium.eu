name: Desktop (Linux verify)

# The Tauri desktop client (Linux + Windows) is Rust all the way down — its backend
# uses the mycellium-sdk crate directly. We build it and run its messaging
# round-trip test on Linux on every relevant change, catching SDK drift that would
# break the desktop app. (The GUI itself needs a display; the build + test are the
# gate. Windows bundling happens on a Windows host.)
on:
  push:
    branches: [main]
    paths:
      - 'clients/desktop/**'
      - 'crates/mycellium-sdk/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'clients/desktop/**'
      - 'crates/mycellium-sdk/**'
  workflow_dispatch:

jobs:
  desktop:
    name: build + round-trip test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
            libayatana-appindicator3-dev pkg-config
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri
      - name: Build + test the Tauri backend (uses the SDK directly)
        working-directory: clients/desktop/src-tauri
        run: |
          cargo build
          cargo test
          cargo clippy --all-targets -- -D warnings
          cargo fmt --check
