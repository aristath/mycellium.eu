[package]
name = "mycellium-engine"
version = "0.0.0"
description = "The headless Mycellium peer: conversations, groups, multi-device delivery, presence"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
mycellium-core = { path = "../mycellium-core" }
mycellium-transport = { path = "../mycellium-transport" }
mycellium-storage = { path = "../mycellium-storage" }
mycellium-directory-client = { path = "../mycellium-directory-client" }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
getrandom = "0.2"

[lints.rust]
unsafe_code = "forbid"
