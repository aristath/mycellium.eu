[package]
name = "mycellium-registry"
version = "0.0.0"
description = "Mycellium account registry: handles, encrypted wallet recovery, and signed records"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
mycellium-core = { path = "../mycellium-core" }
anyhow = "1"
argon2 = "0.5"
axum = "0.8"
chacha20poly1305 = "0.10"
getrandom = "0.2"
hmac = "0.12"
hkdf = "0.12"
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["http1", "server-auto", "service", "tokio"] }
opaque-ke = { version = "4.0.1", features = ["argon2"] }
rand = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
rusqlite = { version = "0.32", features = ["bundled"] }
rustix = { version = "1", features = ["fs", "process"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }
tower = { version = "0.5", features = ["limit", "util"] }
zeroize = "1"

[lints.rust]
unsafe_code = "forbid"
