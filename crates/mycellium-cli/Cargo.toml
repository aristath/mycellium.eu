[package]
name = "mycellium-cli"
version = "0.0.0"
description = "Mycellium Full-tier client shell (CLI)"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
mycellium-core = { path = "../mycellium-core" }
mycellium-transport = { path = "../mycellium-transport" }
mycellium-storage = { path = "../mycellium-storage" }
mycellium-directory-client = { path = "../mycellium-directory-client" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
getrandom = "0.2"
# Terminal UI for interactive chat (bundles crossterm).
ratatui = "0.29"

[dev-dependencies]
# Tests spin up an in-process directory; the client itself never depends on it.
mycellium-directory = { path = "../mycellium-directory" }

[lints.rust]
unsafe_code = "forbid"
