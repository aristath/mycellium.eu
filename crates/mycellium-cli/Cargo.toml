[package]
name = "mycellium-cli"
version = "0.0.0"
description = "Mycellium Full-tier client shell (CLI)"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
mycellium-core = { path = "../mycellium-core" }
mycellium-transport = { path = "../mycellium-transport" }
mycellium-storage = { path = "../mycellium-storage" }
mycellium-directory-client = { path = "../mycellium-directory-client" }
mycellium-engine = { path = "../mycellium-engine" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
getrandom = "0.2"
# Terminal UI for interactive chat (bundles crossterm).
ratatui = "0.29"
# Render contact cards / pairing offers as scannable terminal QR codes.
qrcode = { version = "0.14", default-features = false }

[dev-dependencies]
# Tests spin up an in-process directory + queue; the client depends on neither.
mycellium-directory = { path = "../mycellium-directory" }
mycellium-queue = { path = "../mycellium-queue" }
# Both services are async now; the e2e harness runs each in a tokio runtime.
tokio = { version = "1", features = ["rt-multi-thread"] }

[lints.rust]
unsafe_code = "forbid"
